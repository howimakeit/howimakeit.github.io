<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% if page.layout == "archive" %}
  <link rel="stylesheet" href="{{ '/assets/css/archive.css' | relative_url }}">
  {% endif %}

  {% if page.layout == "deadline" %}
  <link rel="stylesheet" href="{{ '/assets/css/deadline.css' | relative_url }}">
  {% endif %}
</head>


<body>
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>
  <header>
    <nav>
      <ul>
        <li><a href="{{ '/' | relative_url }}">Home</a></li>
        <li><a href="{{ '/archive/' | relative_url }}">Archive</a></li>
        <li><a href="{{ '/deadline/' | relative_url }}">deadline</a></li>
        <li><a href="{{ '/road/' | relative_url }}">road</a></li>

      </ul>
    </nav>
  </header>

  <main class="posts">
    {% for post in site.posts %}
    <article class="post-card">
      <!-- 左侧内容 -->
      <div class="post-content">
        <h2><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h2>
        <div class="post-excerpt">
          <p class="typewriter"
            data-text="{% if post.excerpt %}{{ post.excerpt | strip_html | strip_newlines }}{% else %}Nothing just walk{% endif %}">
          </p>
        </div>
      </div>

      <!-- 右侧图片 -->
      {% if post.image %}
      <div class="post-image">
        <img src="{{ post.image }}" alt="{{ post.title }}">
      </div>
      {% endif %}
    </article>
    {% endfor %}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
  </footer>

  <!-- 打字机效果脚本 -->
  <script>
    document.querySelectorAll(".posts article").forEach(article => {
      const typewriter = article.querySelector(".typewriter");
      let animated = false; // 确保每个文章只触发一次

      article.addEventListener("mouseenter", () => {
        if (!animated) {
          typewriter.textContent = "";
          const text = typewriter.getAttribute("data-text");
          let i = 0;

          function type() {
            if (i < text.length) {
              typewriter.textContent += text[i];
              i++;

              // 页面滚动，让最新文字可见
              typewriter.parentElement.scrollTop = typewriter.parentElement.scrollHeight;

              setTimeout(type, 80); // 调整打字速度
            } else {
              // 打完后，保留文字，不消失
              typewriter.style.borderRight = "none";
            }
          }

          type();
          animated = true;
        }
      });
    });

    //密码是：随机漫步
    // 改造后的密码验证逻辑（核心）
    (function () {
      const PASSWORD_KEY = "randomWalk_auth"; // 存储验证状态的key
      const CORRECT_PASSWORD = "随机漫步";   // 你的密码

      // 第一步：检查会话中是否已有验证通过的状态
      const isAuthenticated = sessionStorage.getItem(PASSWORD_KEY) === "true";

      // 如果已验证通过，直接跳过密码输入
      if (isAuthenticated) {
        return; // 终止函数，不执行后续验证逻辑
      }

      // 第二步：未验证过，执行密码输入逻辑
      function verifyPassword() {
        const userInput = prompt("请输入访问密码：");

        // 处理用户取消输入的情况
        if (userInput === null) {
          alert("您取消了验证！");
          window.location.href = "/road/";
          return;
        }

        // 密码正确：保存验证状态到会话存储
        if (userInput === CORRECT_PASSWORD) {
          sessionStorage.setItem(PASSWORD_KEY, "true"); // 标记为已验证
          alert("密码正确，欢迎访问！");
        }
        // 密码错误：跳转到road页面
        else {
          alert("密码错误！");
          window.location.href = "/road/";
        }
      }

      // 执行密码验证
      verifyPassword();
    })();
  </script>


</body>

</html>
